
<div class="flex flex-col items-center gap-4 p-8">
  <h1 class="text-3xl font-bold text-gray-800">Count: {{ count() }}</h1>
  <p class="text-gray-500">Double: {{ doubled() }}</p>
  <p class="text-gray-500">Discount: {{ discount }}</p>
  <p class="text-gray-500">GST: {{ GST() }}</p>
  <button
    class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700"
    (click)="increment()"
  >
    Increment
  </button>
</div>
