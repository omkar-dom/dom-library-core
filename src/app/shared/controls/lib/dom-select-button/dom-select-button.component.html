<div class="flex flex-col gap-1 w-full">
  <!-- Label with required indicator -->
  @if (label()) {
    <label class="text-sm font-medium text-slate-700 dark:text-slate-300 mb-1 flex items-center">
      {{ label() }}
      @if (is_required()) {
        <span class="text-rose-500 ml-1 font-bold">*</span>
      }
    </label>
  }

  <!-- Segmented Button Container -->
  <div class="inline-flex flex-wrap p-1 bg-slate-100 dark:bg-slate-800/80 rounded-md gap-1 w-fit border border-slate-200/50 dark:border-slate-700/30"
       [class.opacity-60]="is_disabled()"
       [class.pointer-events-none]="is_disabled()">
    
    @for (option of options(); track option.value) {
      <button type="button"
              (click)="selectOption(option)"
              [disabled]="option.disabled"
              class="flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-md transition-all duration-200 cursor-pointer select-none border border-transparent"
              [ngClass]="{
                'bg-white dark:bg-slate-700 text-slate-800 dark:text-white shadow-sm scale-102 border-slate-200/60 dark:border-slate-600/50': isSelected(option.value),
                'text-slate-600 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 hover:bg-white/40 dark:hover:bg-slate-700/20': !isSelected(option.value),
                'opacity-40 cursor-not-allowed': option.disabled
              }">
        
        @if (option.icon) {
          <i [class]="option.icon + ' text-sm transition-transform duration-200'" 
             [class.scale-110]="isSelected(option.value)"></i>
        }
        <span>{{ option.label }}</span>
      </button>
    }
  </div>

  <!-- Hint -->
  @if (hint()) {
    <p class="text-xs text-slate-400 dark:text-slate-500 mt-1 pl-1">
      {{ hint() }}
    </p>
  }

  <!-- Error display -->
  @if (form()) {
    <dom-error class="ml-1 mt-1" [field]="field()" />
  } @else if (form_group()) {
    <dom-error class="ml-1 mt-1" [control]="legacyControl()" />
  }
</div>
