@if (is_rendered()) {
  <div class="fixed inset-0 z-50 flex" 
       [ngClass]="{
         'justify-start': position() === 'left',
         'justify-end': position() === 'right',
         'items-start': position() === 'top',
         'items-end': position() === 'bottom',
         'flex-col': position() === 'top' || position() === 'bottom'
       }" 
       role="dialog" 
       aria-modal="true">
    
    <!-- Backdrop Blur with Fade Animation -->
    <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity duration-300 ease-out"
         [ngClass]="is_visible() ? 'opacity-100' : 'opacity-0'"
         (click)="onBackdropClick()">
    </div>
    
    <!-- Drawer Slide Container -->
    <div class="relative z-10 bg-white dark:bg-slate-900 shadow-2xl flex flex-col transition-transform duration-300 ease-out border-slate-100 dark:border-slate-800"
         [ngClass]="[
           'drawer-' + position(),
           is_visible() ? 'translate-none' : 'drawer-closed-' + position()
         ]"
         [ngStyle]="{
           'width': position() === 'left' || position() === 'right' ? '400px' : '100%',
           'max-width': position() === 'left' || position() === 'right' ? '100vw' : '100%',
           'height': position() === 'top' || position() === 'bottom' ? '320px' : '100vh',
           'max-height': position() === 'top' || position() === 'bottom' ? '100vh' : '100%',
           'border-left-width': position() === 'right' ? '1px' : '0px',
           'border-right-width': position() === 'left' ? '1px' : '0px',
           'border-bottom-width': position() === 'top' ? '1px' : '0px',
           'border-top-width': position() === 'bottom' ? '1px' : '0px'
         }">
         
      <!-- Header -->
      <div class="px-6 py-4 flex items-center justify-between border-b border-slate-100 dark:border-slate-800">
        @if (header_template()) {
          <ng-container *ngTemplateOutlet="header_template()"></ng-container>
        } @else {
          <h3 class="text-lg font-semibold text-slate-800 dark:text-slate-100">
            {{ title() }}
          </h3>
        }
        <button type="button" 
                (click)="close()"
                class="rounded-md p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-50 dark:hover:bg-slate-800 transition duration-150 cursor-pointer"
                aria-label="Close panel">
          <i class="fa-solid fa-xmark text-lg"></i>
        </button>
      </div>
      
      <!-- Body -->
      <div class="flex-1 overflow-y-auto px-6 py-4 text-slate-600 dark:text-slate-300">
        <ng-content></ng-content>
      </div>
      
      <!-- Footer -->
      <div class="px-6 py-4 border-t border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 flex items-center justify-end gap-3">
        <ng-content select="[drawer-footer]"></ng-content>
      </div>
      
    </div>
  </div>
}
