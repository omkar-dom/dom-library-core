<div class="relative w-full overflow-hidden rounded-md group border border-slate-200/40 dark:border-slate-800/30"
     (mouseenter)="onMouseEnter()"
     (mouseleave)="onMouseLeave()">
  
  <!-- Slides Frame -->
  <div class="relative w-full aspect-[16/9] overflow-hidden bg-slate-950">
    @for (item of items(); track $index) {
      <div class="absolute inset-0 w-full h-full transition-all duration-700 ease-in-out transform flex items-center justify-center"
           [ngClass]="{
             'translate-x-0 opacity-100 z-10': active_index() === $index,
             'translate-x-full opacity-0 z-0': $index > active_index(),
             '-translate-x-full opacity-0 z-0': $index < active_index()
           }">
        
        @if (slide_template) {
          <ng-container *ngTemplateOutlet="slide_template; context: { $implicit: item, index: $index }"></ng-container>
        } @else {
          <img [src]="item" class="w-full h-full object-cover select-none" alt="Slide image" />
        }
      </div>
    }
  </div>

  <!-- Left/Right Controls -->
  @if (show_controls() && items().length > 1) {
    <button type="button"
            (click)="prev()"
            class="absolute left-4 top-1/2 -translate-y-1/2 z-20 flex items-center justify-center w-10 h-10 rounded-full bg-white/25 dark:bg-black/25 backdrop-blur-md text-white border border-white/20 hover:bg-white/40 dark:hover:bg-black/40 hover:scale-105 opacity-0 group-hover:opacity-100 transition-all duration-300 cursor-pointer shadow-lg"
            aria-label="Previous slide">
      <i class="fa-solid fa-chevron-left text-sm"></i>
    </button>
    <button type="button"
            (click)="next()"
            class="absolute right-4 top-1/2 -translate-y-1/2 z-20 flex items-center justify-center w-10 h-10 rounded-full bg-white/25 dark:bg-black/25 backdrop-blur-md text-white border border-white/20 hover:bg-white/40 dark:hover:bg-black/40 hover:scale-105 opacity-0 group-hover:opacity-100 transition-all duration-300 cursor-pointer shadow-lg"
            aria-label="Next slide">
      <i class="fa-solid fa-chevron-right text-sm"></i>
    </button>
  }

  <!-- Slide Dot Indicators -->
  @if (show_indicators() && items().length > 1) {
    <div class="absolute bottom-4 left-1/2 -translate-y-0 -translate-x-1/2 z-20 flex gap-2 p-1.5 rounded-full bg-slate-900/30 backdrop-blur-md border border-white/10">
      @for (item of items(); track $index) {
        <button type="button"
                (click)="goToSlide($index)"
                class="w-2.5 h-2.5 rounded-full transition-all duration-300 cursor-pointer"
                [ngClass]="{
                  'bg-white w-6 shadow-md': active_index() === $index,
                  'bg-white/50 hover:bg-white/80': active_index() !== $index
                }"
                [attr.aria-label]="'Go to slide ' + ($index + 1)">
        </button>
      }
    </div>
  }
</div>
