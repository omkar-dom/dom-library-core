@if (is_rendered()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4 overflow-y-auto" role="dialog" aria-modal="true">
    
    <!-- Backdrop Blur -->
    <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity duration-300 ease-out"
         [ngClass]="is_visible() ? 'opacity-100' : 'opacity-0'"
         (click)="onBackdropClick()">
    </div>
    
    <!-- Dialog Card with Zoom/Scale Animation -->
    <div class="relative z-10 w-full bg-white dark:bg-slate-900 shadow-2xl rounded-md flex flex-col transition-all duration-300 ease-out border border-slate-100 dark:border-slate-800"
         [ngClass]="[
           'dialog-' + size(),
           is_visible() ? 'scale-100 opacity-100' : 'scale-95 opacity-0'
         ]">
         
      <!-- Header -->
      <div class="px-6 py-4 flex items-center justify-between border-b border-slate-100 dark:border-slate-800">
        @if (header_template()) {
          <ng-container *ngTemplateOutlet="header_template()"></ng-container>
        } @else {
          <h3 class="text-lg font-semibold text-slate-800 dark:text-slate-100">
            {{ title() }}
          </h3>
        }
        <button type="button" 
                (click)="close()"
                class="rounded-md p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-50 dark:hover:bg-slate-800 transition duration-150 cursor-pointer"
                aria-label="Close dialog">
          <i class="fa-solid fa-xmark text-lg"></i>
        </button>
      </div>
      
      <!-- Body -->
      <div class="px-6 py-5 overflow-y-auto text-slate-600 dark:text-slate-300 max-h-[70vh]">
        <ng-content></ng-content>
      </div>
      
      <!-- Footer -->
      <div class="px-6 py-4 border-t border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 flex items-center justify-end gap-3 rounded-b-md">
        <ng-content select="[dialog-footer]"></ng-content>
      </div>
      
    </div>
  </div>
}
