<div class="flex flex-col gap-1 w-full">
  @if (!options().length) {
    <div class="flex items-center">
      <label class="inline-flex items-center gap-2 cursor-pointer select-none">
        <input
          type="checkbox"
          [formControl]="control()"
          [id]="'chk-' + form_control()"
          class="rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 w-4 h-4 transition-all cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
        />
        @if (label()) {
          <span class="text-sm text-slate-700"
            >{{ label() }}
            @if (is_required()) {
              <span class="text-rose-500 text-xs ml-0.5">*</span>
            }
          </span>
        }
      </label>
    </div>
    @if (control().invalid && control().touched) {
      <dom-error class="mt-1" [control]="control()" />
    }
  } @else {
    @if (label()) {
      <label class="text-xs font-medium text-slate-600 mb-1 select-none"
        >{{ label() }}
        @if (is_required()) {
          <span class="text-rose-500 text-xs ml-0.5">*</span>
        }
      </label>
    }
    <div [class]="layout() === 'horizontal' ? 'flex flex-row flex-wrap gap-4' : 'flex flex-col gap-2'">
      @for (opt of options(); track opt.id) {
        <div class="flex items-center">
          <label class="inline-flex items-center gap-2 cursor-pointer select-none">
            <input
              type="checkbox"
              [id]="'chk-' + opt.id"
              [checked]="isChecked(opt.id)"
              (change)="toggle(opt.id)"
              [disabled]="opt.disabled ?? false"
              class="rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 w-4 h-4 transition-all cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
            />
            <span class="text-sm text-slate-700"
              >{{ opt.title }}
              @if (opt.disabled) {
                <span class="text-slate-400 text-xs"> (disabled)</span>
              }
            </span>
          </label>
        </div>
      }
    </div>
    @if (control().invalid && control().touched) {
      <dom-error class="mt-1" [control]="control()"/>
    }
  }
</div>
