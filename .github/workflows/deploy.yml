name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Grant permissions to write content back to the repository (required for gh-pages branch deployment)
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: |
          npx ng build --base-href /dom-library-core/
          # Create a copy of index.html as 404.html to handle Angular SPA routing on GitHub Pages
          cp dist/dom-library/browser/index.html dist/dom-library/browser/404.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/dom-library/browser
          branch: gh-pages
